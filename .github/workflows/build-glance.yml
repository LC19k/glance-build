name: Build & Publish Glance

on:
  workflow_dispatch:
    inputs:
      glance_ref:
        description: "Glance ref (commit/tag) for stable build"
        required: true
        default: "main"
  schedule:
    - cron: "0 4 * * *" # 04:00 UTC nightly

jobs:
  stable:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: lc19k/glance

    steps:
      - name: Checkout glance-build repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build metadata
        id: meta
        run: |
          echo "GLANCE_REF=${{ github.event.inputs.glance_ref }}" >> $GITHUB_ENV
          echo "TAG_STABLE=stable" >> $GITHUB_ENV

      - name: Build and push (stable)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            GLANCE_REF=${{ env.GLANCE_REF }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG_STABLE }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ env.GLANCE_REF }}

  nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: lc19k/glance

    steps:
      - name: Checkout glance-build repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve upstream Glance HEAD
        id: upstream
        run: |
          LATEST_SHA=$(git ls-remote https://github.com/glanceapp/glance.git HEAD | cut -f1)
          echo "LATEST_SHA=${LATEST_SHA}" >> $GITHUB_ENV
          echo "latest_sha=${LATEST_SHA}" >> $GITHUB_OUTPUT

      # NOTE: true upstream-change gating would require persistent state.
      # For now, we always build nightly from main.

      - name: Set nightly tags
        id: tags
        run: |
          DATE_TAG=$(date -u +'%Y%m%d')
          echo "DATE_TAG=${DATE_TAG}" >> $GITHUB_ENV
          echo "TAG_LATEST=latest" >> $GITHUB_ENV
          echo "TAG_DATE=nightly-${DATE_TAG}" >> $GITHUB_ENV
          echo "TAG_SHA=sha-${{ steps.upstream.outputs.latest_sha }}" >> $GITHUB_ENV

      - name: Build and push (nightly)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            GLANCE_REF=main
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG_LATEST }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG_DATE }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG_SHA }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ env.LATEST_SHA }}
