name: Build & Publish Glance

permissions:
  contents: read
  packages: write

on:
  workflow_dispatch:
    inputs:
      glance_ref:
        description: "Glance ref (commit/tag) for stable build"
        required: true
        default: "main"

  schedule:
    - cron: "0 4 * * *" # nightly at 04:00 UTC

jobs:

  ###############################################################
  # 1. STABLE BUILD (manual, pinned, tagged `stable`)
  ###############################################################
  stable:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: lc19k/glance

    steps:
      - name: Checkout glance-build repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (single build, no push)
        uses: docker/build-push-action@v5
        id: build
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          build-args: |
            GLANCE_REF=${{ github.event.inputs.glance_ref }}

      - name: Push tag: stable
        run: |
          docker tag glance:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable

      - name: Push tag: sha-<ref>
        run: |
          docker tag glance:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.event.inputs.glance_ref }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.event.inputs.glance_ref }}

  ###############################################################
  # 2. NIGHTLY BUILD (scheduled, only builds if upstream changed)
  ###############################################################
  nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: lc19k/glance

    steps:
      - name: Checkout glance-build repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      ###############################################################
      # Step 1 — Get upstream HEAD SHA
      ###############################################################
      - name: Get upstream Glance HEAD SHA
        id: upstream
        run: |
          LATEST_SHA=$(git ls-remote https://github.com/glanceapp/glance.git HEAD | cut -f1)
          echo "latest_sha=${LATEST_SHA}" >> $GITHUB_OUTPUT

      ###############################################################
      # Step 2 — Get last built SHA from GHCR
      ###############################################################
      - name: Get last built SHA from GHCR
        id: last
        run: |
          set +e
          LAST_SHA=$(docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            | jq -r '.annotations["org.opencontainers.image.revision"]')
          echo "last_sha=${LAST_SHA}" >> $GITHUB_OUTPUT
          set -e

      ###############################################################
      # Step 3 — Compare SHAs, skip if unchanged
      ###############################################################
      - name: Check if upstream changed
        id: compare
        run: |
          if [ "${{ steps.upstream.outputs.latest_sha }}" = "${{ steps.last.outputs.last_sha }}" ]; then
            echo "skip_build=true" >> $GITHUB_OUTPUT
          else
            echo "skip_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no changes
        if: steps.compare.outputs.skip_build == 'true'
        run: exit 0

      ###############################################################
      # Step 4 — Build image (single build, no push)
      ###############################################################
      - name: Build image (nightly)
        uses: docker/build-push-action@v5
        id: build
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          build-args: |
            GLANCE_REF=${{ steps.upstream.outputs.latest_sha }}

      ###############################################################
      # Step 5 — Push tags sequentially (GHCR-safe)
      ###############################################################
      - name: Push tag: latest
        run: |
          docker tag glance:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Push tag: nightly-<date>
        run: |
          DATE_TAG=$(date -u +'%Y%m%d')
          docker tag glance:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nightly-${DATE_TAG}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nightly-${DATE_TAG}

      - name: Push tag: sha-<commit>
        run: |
          docker tag glance:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.upstream.outputs.latest_sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.upstream.outputs.latest_sha }}
