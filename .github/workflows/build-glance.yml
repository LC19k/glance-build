name: Build & Publish Glance

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      glance_ref:
        description: "Glance ref (commit/tag) for stable build"
        required: true
        default: "main"

  schedule:
    - cron: "0 4 * * *" # nightly at 04:00 UTC

jobs:

  ###############################################################
  # 1. STABLE BUILD (manual, pinned, tagged `stable`)
  ###############################################################
  stable:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: lc19k/glance

    steps:
      - name: Checkout glance-build repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push ONLY the stable tag in this step
      - name: Build and push (stable)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            GLANCE_REF=${{ github.event.inputs.glance_ref }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.inputs.glance_ref }}

      # Re‑tag the already‑pushed image as sha-<ref> and push again
      - name: Tag and push sha-<ref>
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.event.inputs.glance_ref }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.event.inputs.glance_ref }}

  ###############################################################
  # 2. NIGHTLY BUILD (scheduled, only builds if upstream changed)
  ###############################################################
  nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: lc19k/glance

    steps:
      - name: Checkout glance-build repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get upstream Glance HEAD SHA
        id: upstream
        run: |
          LATEST_SHA=$(git ls-remote https://github.com/glanceapp/glance.git HEAD | cut -f1)
          echo "latest_sha=${LATEST_SHA}" >> $GITHUB_OUTPUT

      - name: Get last built SHA from GHCR
        id: last
        run: |
          set +e
          LAST_SHA=$(docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            | jq -r '.annotations["org.opencontainers.image.revision"]')
          echo "last_sha=${LAST_SHA}" >> $GITHUB_OUTPUT
          set -e

      - name: Check if upstream changed
        id: compare
        run: |
          if [ "${{ steps.upstream.outputs.latest_sha }}" = "${{ steps.last.outputs.last_sha }}" ]; then
            echo "skip_build=true" >> $GITHUB_OUTPUT
          else
            echo "skip_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no changes
        if: steps.compare.outputs.skip_build == 'true'
        run: exit 0

      - name: Set nightly tags
        id: tags
        run: |
          DATE_TAG=$(date -u +'%Y%m%d')
          echo "DATE_TAG=${DATE_TAG}" >> $GITHUB_ENV
          echo "TAG_LATEST=latest" >> $GITHUB_ENV
          echo "TAG_DATE=nightly-${DATE_TAG}" >> $GITHUB_ENV
          echo "TAG_SHA=sha-${{ steps.upstream.outputs.latest_sha }}" >> $GITHUB_ENV

      - name: Build and push (nightly)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            GLANCE_REF=${{ steps.upstream.outputs.latest_sha }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG_LATEST }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG_DATE }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG_SHA }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.upstream.outputs.latest_sha }}
